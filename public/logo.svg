<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow gradient -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Inner gradient -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="60" cy="60" r="58" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Main circle -->
  <circle cx="60" cy="60" r="50" fill="url(#mainGrad)" opacity="0.15" stroke="url(#mainGrad)" stroke-width="2"/>

  <!-- Stylized "E" letterform - represents Eesha -->
  <!-- Top bar -->
  <rect x="35" y="32" width="38" height="7" rx="3.5" fill="url(#innerGrad)" opacity="0.95"/>
  <!-- Middle bar -->
  <rect x="35" y="55" width="30" height="7" rx="3.5" fill="url(#innerGrad)" opacity="0.85"/>
  <!-- Bottom bar -->
  <rect x="35" y="78" width="38" height="7" rx="3.5" fill="url(#innerGrad)" opacity="0.95"/>
  <!-- Vertical stem -->
  <rect x="35" y="32" width="7" height="53" rx="3.5" fill="url(#innerGrad)" opacity="0.9"/>

  <!-- Sparkle/accent dot - AI indicator -->
  <circle cx="82" cy="35" r="4" fill="#22d3ee" opacity="0.9"/>
  <circle cx="82" cy="35" r="7" fill="#22d3ee" opacity="0.2"/>

  <!-- Subtle circuit lines -->
  <line x1="82" y1="39" x2="82" y2="50" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="82" y1="50" x2="75" y2="55" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <circle cx="82" cy="50" r="1.5" fill="#22d3ee" opacity="0.4"/>
</svg>
